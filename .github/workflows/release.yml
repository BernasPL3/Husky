name: Husky Full Release

on:
  push:
    tags:
      - "v1.0"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # BASE DEPENDENCIES
      # =========================
      - name: Install base tools
        run: |
          sudo apt update
          sudo apt install -y wget git make xz-utils ca-certificates

      # =========================
      # DEVKITPRO (STABLE BOOTSTRAP)
      # =========================
      - name: Install devkitPro
        run: |
          wget https://apt.devkitpro.org/devkitpro-bootstrap.sh
          chmod +x devkitpro-bootstrap.sh
          sudo ./devkitpro-bootstrap.sh

      # =========================
      # 3DS TOOLCHAIN
      # =========================
      - name: Install 3DS tools
        run: |
          sudo dkp-pacman -S --noconfirm 3ds-dev 3ds-tools

      # =========================
      # ENVIRONMENT
      # =========================
      - name: Setup PATH
        run: |
          echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
          echo "DEVKITARM=/opt/devkitpro/devkitARM" >> $GITHUB_ENV
          echo "/opt/devkitpro/tools/bin" >> $GITHUB_PATH

      # =========================
      # BUILD ELF + 3DSX
      # =========================
      - name: Build Husky
        run: make clean && make

      # =========================
      # CREATE CIA ASSETS
      # =========================
      - name: Build CIA assets
        run: |
          mkdir -p build

          smdhtool assets/icon.png \
            -s "Husky!" \
            -l "Husky 3DS Platformer" \
            -p "Indie Dev" \
            -o build/icon.smdh

          bannertool makebanner \
            -i assets/icon.png \
            -o build/banner.bin

          makerom -f cia \
            -o build/Husky.cia \
            -target t \
            -exefslogo \
            -elf build/Husky.elf \
            -icon build/icon.smdh \
            -bannertool build/banner.bin

      # =========================
      # RELEASE (AUTO UPLOAD)
      # =========================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Husky.3dsx
            build/Husky.cia
            build/Husky.elf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
